# Starter pipeline


# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- task: owaspzap@1
  inputs:
    aggressivemode: true
    threshold: '500'
    scantype: 'targetedScan'
    url: 'https://bytesec.web.app/'
    port: '443'